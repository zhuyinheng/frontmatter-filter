name: Live Publish Smoke

on:
  workflow_dispatch:

concurrency:
  group: live-publish-smoke
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  live:
    name: Live Publish Smoke
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Prepare SSH Key
        run: |
          install -d -m 700 "$RUNNER_TEMP/frontmatter-filter-live"
          printf '%s\n' "${{ secrets.E2E_LIVE_SSH_KEY }}" > "$RUNNER_TEMP/frontmatter-filter-live/id_ed25519"
          chmod 600 "$RUNNER_TEMP/frontmatter-filter-live/id_ed25519"
          ssh-keyscan github.com > "$RUNNER_TEMP/frontmatter-filter-live/known_hosts"

      - name: Run Live Publish Smoke
        env:
          E2E_LIVE_REMOTE: git@github.com:zhuyinheng/frontmatter-filter-live.git
          E2E_LIVE_BRANCH: live-smoke
          E2E_LIVE_SSH_KEY_PATH: ${{ runner.temp }}/frontmatter-filter-live/id_ed25519
          E2E_LIVE_KNOWN_HOSTS_PATH: ${{ runner.temp }}/frontmatter-filter-live/known_hosts
        run: npm run test:live:publish-smoke
