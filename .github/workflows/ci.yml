name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  node:
    name: Unit And Integration Local
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch Fixture Vault Over HTTPS
        run: |
          rm -rf tests/fixtures/obsidian_test_vault
          git clone https://github.com/zhuyinheng/obsidian_test_vault.git tests/fixtures/obsidian_test_vault

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Run Unit Tests
        run: npm run test:unit

      - name: Run Integration Local Tests
        run: npm run test:integration:local

      - name: Type Check
        run: ./node_modules/.bin/tsc --noEmit
